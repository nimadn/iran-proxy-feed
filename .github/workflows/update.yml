name: Update Iranian proxy feed

on:
  workflow_dispatch:

  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write

concurrency:
  group: iran-proxy-feed-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate proxy subscriptions
        run: python convert.py

      - name: Validate generated files
        run: |
          python -m json.tool docs/iran-all.json > /dev/null

          test -s docs/iran-all.json
          test -s docs/iran-all-plain.txt
          test -s docs/iran-v2ray.txt
          test -s docs/iran-v2ray-plain.txt

          python - <<'PY'
          import base64
          from pathlib import Path

          encoded = Path(
              "docs/iran-v2ray.txt"
          ).read_text(
              encoding="ascii"
          ).strip()

          decoded = base64.b64decode(
              encoded,
              validate=True,
          ).decode("utf-8")

          links = [
              line
              for line in decoded.splitlines()
              if line.strip()
          ]

          if not links:
              raise RuntimeError(
                  "v2ray subscription contains no links"
              )

          invalid = [
              link
              for link in links
              if not link.startswith(
                  (
                      "socks4://",
                      "socks4a://",
                      "socks5://",
                  )
              )
          ]

          if invalid:
              raise RuntimeError(
                  f"Invalid v2ray links: {invalid[:3]}"
              )

          print(
              f"Validated {len(links)} "
              "v2rayN SOCKS links"
          )
          PY

      - name: Commit updated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            docs/iran-all.json \
            docs/iran-all-plain.txt \
            docs/iran-v2ray.txt \
            docs/iran-v2ray-plain.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update Iranian proxy feeds"
          git push
