name: Update Iranian proxy feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
  pull_request:
    paths:
      - "convert.py"
      - "prepare_history.py"
      - "tests/**"
      - "docs/index.html"
      - "docs/qr/**"
      - ".github/workflows/update.yml"

permissions:
  contents: write

concurrency:
  group: iran-proxy-feed-update-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'main' }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: |
          python -m py_compile convert.py
          python -m py_compile prepare_history.py

      - name: Validate QR assets
        run: |
          python - <<'PY'
          from pathlib import Path
          from xml.etree import ElementTree

          names = [
              "hiddify.txt",
              "v2rayn.txt",
              "happ.txt",
              "sing-box.json",
          ]
          base_url = "https://nimadn.github.io/iran-proxy-feed/"
          html = Path("docs/index.html").read_text(encoding="utf-8")

          for name in names:
              svg = Path("docs/qr") / f"{name}.svg"
              ElementTree.parse(svg)
              if f'src="qr/{name}.svg"' not in html:
                  raise RuntimeError(f"Missing QR image reference for {name}")
              if f"{base_url}{name}" not in html:
                  raise RuntimeError(f"Missing public URL for {name}")

          if "happ://add/" in html:
              raise RuntimeError("HAPP deep-link buttons must not be published")

          print(f"Validated {len(names)} app-specific QR subscriptions")
          PY

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Confirm curl SOCKS support
        run: curl --version

      - name: Generate and test feeds
        run: python convert.py

      - name: Validate JSON files
        run: |
          for file in docs/*.json; do
            python -m json.tool "$file" > /dev/null
          done

      - name: Validate subscriptions
        run: |
          python - <<'PY'
          import base64
          import json
          from pathlib import Path

          report = json.loads(
              Path("docs/iran-report.json").read_text(encoding="utf-8")
          )

          files = {
              "verified": (
                  Path("docs/iran-verified-proxies.txt"),
                  {"http", "socks4", "socks5"},
              ),
              "openray": (
                  Path("docs/iran-openray.txt"),
                  {
                      "vless",
                      "vmess",
                      "trojan",
                      "ss",
                      "ssr",
                      "hysteria2",
                      "hy2",
                      "tuic",
                  },
              ),
              "combined": (
                  Path("docs/iran-combined.txt"),
                  {
                      "http",
                      "socks4",
                      "socks5",
                      "vless",
                      "vmess",
                      "trojan",
                      "ss",
                      "ssr",
                      "hysteria2",
                      "hy2",
                      "tuic",
                  },
              ),
          }

          decoded_counts = {}

          for name, (path, allowed) in files.items():
              encoded = path.read_text(encoding="ascii").strip()
              decoded = (
                  base64.b64decode(encoded, validate=True).decode("utf-8")
                  if encoded
                  else ""
              )
              links = [line.strip() for line in decoded.splitlines() if line.strip()]

              invalid = []
              for link in links:
                  if "://" not in link:
                      invalid.append(link)
                      continue
                  scheme = link.split("://", 1)[0].lower()
                  if scheme not in allowed:
                      invalid.append(link)

              if invalid:
                  raise RuntimeError(f"{name} has invalid links: {invalid[:5]}")

              decoded_counts[name] = len(links)

          expected = {
              "verified": report["published_verified_proxies"],
              "openray": report["openray_share_links"],
              "combined": report["combined_subscription_links"],
          }

          if decoded_counts != expected:
              raise RuntimeError(
                  f"Subscription count mismatch: actual={decoded_counts}, expected={expected}"
              )

          app_files = {
              "hiddify": (
                  Path("docs/hiddify.txt"),
                  False,
                  {"vless", "vmess", "trojan", "ss", "hysteria2", "hy2", "tuic"},
              ),
              "v2rayn": (
                  Path("docs/v2rayn.txt"),
                  True,
                  {"vless", "vmess", "trojan", "ss", "hysteria2", "hy2", "tuic", "socks"},
              ),
              "happ": (
                  Path("docs/happ.txt"),
                  False,
                  {"vless", "vmess", "trojan", "ss", "socks"},
              ),
          }
          app_counts = {}

          for name, (path, encoded, allowed) in app_files.items():
              content = path.read_text(encoding="ascii" if encoded else "utf-8").strip()
              if encoded:
                  content = (
                      base64.b64decode(content, validate=True).decode("utf-8")
                      if content
                      else ""
                  )
              links = [line.strip() for line in content.splitlines() if line.strip()]
              invalid = [
                  link
                  for link in links
                  if "://" not in link
                  or link.split("://", 1)[0].lower() not in allowed
              ]
              if invalid:
                  raise RuntimeError(
                      f"{name} has unsupported app links: {invalid[:5]}"
                  )
              app_counts[name] = len(links)

          expected_app_counts = report["app_subscription_counts"]
          for name, count in app_counts.items():
              if count != expected_app_counts[name]:
                  raise RuntimeError(
                      f"{name} count mismatch: actual={count}, "
                      f"expected={expected_app_counts[name]}"
                  )

          if Path("docs/sing-box.json").read_bytes() != Path("docs/iran-all.json").read_bytes():
              raise RuntimeError("sing-box.json must match the generated native config")

          print(json.dumps(
              {
                  "legacy": decoded_counts,
                  "apps": app_counts,
              },
              indent=2,
          ))
          PY

      - name: Commit generated files
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            docs/iran-all.json \
            docs/sing-box.json \
            docs/hiddify.txt \
            docs/v2rayn.txt \
            docs/happ.txt \
            docs/iran-verified-proxies.txt \
            docs/iran-verified-proxies-plain.txt \
            docs/iran-openray.txt \
            docs/iran-openray-plain.txt \
            docs/iran-combined.txt \
            docs/iran-combined-plain.txt \
            docs/iran-report.json \
            docs/iran-test-results.json \
            docs/proxy-history.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update Iranian proxy feeds"
          git push
