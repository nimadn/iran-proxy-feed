name: Update Iranian proxy feed

on:
  workflow_dispatch:

  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write

concurrency:
  group: iran-proxy-feed-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate and test proxy feeds
        run: python convert.py

      - name: Validate generated JSON files
        run: |
          python -m json.tool docs/iran-all.json > /dev/null
          python -m json.tool docs/iran-report.json > /dev/null
          python -m json.tool docs/proxy-history.json > /dev/null

      - name: Validate generated subscription
        run: |
          python - <<'PY'
          import base64
          from pathlib import Path

          encoded = Path(
              "docs/iran-v2ray.txt"
          ).read_text(
              encoding="ascii"
          ).strip()

          decoded = base64.b64decode(
              encoded,
              validate=True,
          ).decode("utf-8")

          links = [
              line.strip()
              for line in decoded.splitlines()
              if line.strip()
          ]

          if not links:
              raise RuntimeError(
                  "Generated subscription is empty"
              )

          allowed = (
              "http://",
              "socks4://",
              "socks5://",
          )

          invalid = [
              link
              for link in links
              if not link.startswith(allowed)
          ]

          if invalid:
              raise RuntimeError(
                  f"Invalid links: {invalid[:5]}"
              )

          print(
              f"Validated {len(links)} links"
          )
          PY

      - name: Commit generated files
        run: |
          git config user.name \
            "github-actions[bot]"

          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            docs/iran-all.json \
            docs/iran-all-plain.txt \
            docs/iran-v2ray.txt \
            docs/iran-v2ray-plain.txt \
            docs/iran-report.json \
            docs/proxy-history.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit \
            -m "Update and test Iranian proxy feeds"

          git push
