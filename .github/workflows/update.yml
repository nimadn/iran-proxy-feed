name: Update Iranian proxy feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"
  pull_request:
    paths:
      - "convert.py"
      - "prepare_history.py"
      - ".github/workflows/update.yml"

permissions:
  contents: write

concurrency:
  group: iran-proxy-feed-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: |
          python -m py_compile convert.py
          python -m py_compile prepare_history.py

      - name: Confirm curl SOCKS support
        run: curl --version

      - name: Normalize legacy history
        run: python prepare_history.py

      - name: Generate and test feeds
        run: python convert.py

      - name: Validate JSON files
        run: |
          python -m json.tool docs/iran-all.json > /dev/null
          python -m json.tool docs/iran-report.json > /dev/null
          python -m json.tool docs/iran-test-results.json > /dev/null
          python -m json.tool docs/proxy-history.json > /dev/null

      - name: Validate subscriptions
        run: |
          python - <<'PY'
          import base64
          import json
          from pathlib import Path

          report = json.loads(
              Path("docs/iran-report.json").read_text(encoding="utf-8")
          )

          files = {
              "verified": (
                  Path("docs/iran-verified-proxies.txt"),
                  {"http", "socks4", "socks5"},
              ),
              "openray": (
                  Path("docs/iran-openray.txt"),
                  {
                      "vless",
                      "vmess",
                      "trojan",
                      "ss",
                      "ssr",
                      "hysteria2",
                      "hy2",
                      "tuic",
                  },
              ),
              "combined": (
                  Path("docs/iran-combined.txt"),
                  {
                      "http",
                      "socks4",
                      "socks5",
                      "vless",
                      "vmess",
                      "trojan",
                      "ss",
                      "ssr",
                      "hysteria2",
                      "hy2",
                      "tuic",
                  },
              ),
          }

          decoded_counts = {}

          for name, (path, allowed) in files.items():
              encoded = path.read_text(encoding="ascii").strip()
              decoded = (
                  base64.b64decode(encoded, validate=True).decode("utf-8")
                  if encoded
                  else ""
              )
              links = [line.strip() for line in decoded.splitlines() if line.strip()]

              invalid = []
              for link in links:
                  if "://" not in link:
                      invalid.append(link)
                      continue
                  scheme = link.split("://", 1)[0].lower()
                  if scheme not in allowed:
                      invalid.append(link)

              if invalid:
                  raise RuntimeError(f"{name} has invalid links: {invalid[:5]}")

              decoded_counts[name] = len(links)

          expected = {
              "verified": report["published_verified_proxies"],
              "openray": report["openray_share_links"],
              "combined": report["combined_subscription_links"],
          }

          if decoded_counts != expected:
              raise RuntimeError(
                  f"Subscription count mismatch: actual={decoded_counts}, expected={expected}"
              )

          print(json.dumps(decoded_counts, indent=2))
          PY

      - name: Commit generated files
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            docs/iran-all.json \
            docs/iran-verified-proxies.txt \
            docs/iran-verified-proxies-plain.txt \
            docs/iran-openray.txt \
            docs/iran-openray-plain.txt \
            docs/iran-combined.txt \
            docs/iran-combined-plain.txt \
            docs/iran-report.json \
            docs/iran-test-results.json \
            docs/proxy-history.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update Iranian proxy feeds"
          git push
