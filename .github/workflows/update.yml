name: Update Iranian proxy feed

on:
  workflow_dispatch:

  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write

concurrency:
  group: iran-proxy-feed-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Confirm curl availability
        run: |
          curl --version

      - name: Generate and test proxy feeds
        run: |
          python convert.py

      - name: Validate JSON files
        run: |
          python -m json.tool docs/iran-all.json > /dev/null
          python -m json.tool docs/iran-report.json > /dev/null
          python -m json.tool docs/iran-test-results.json > /dev/null
          python -m json.tool docs/proxy-history.json > /dev/null

      - name: Validate report and subscription
        run: |
          python - <<'PY'
          import base64
          import json
          from pathlib import Path

          report = json.loads(
              Path(
                  "docs/iran-report.json"
              ).read_text(
                  encoding="utf-8"
              )
          )

          encoded = Path(
              "docs/iran-v2ray.txt"
          ).read_text(
              encoding="ascii"
          ).strip()

          if encoded:
              decoded = base64.b64decode(
                  encoded,
                  validate=True,
              ).decode("utf-8")
          else:
              decoded = ""

          links = [
              line.strip()
              for line in decoded.splitlines()
              if line.strip()
          ]

          allowed_prefixes = (
              "http://",
              "socks4://",
              "socks5://",
          )

          invalid = [
              link
              for link in links
              if not link.startswith(
                  allowed_prefixes
              )
          ]

          if invalid:
              raise RuntimeError(
                  "Invalid subscription links: "
                  + repr(invalid[:5])
              )

          expected = report[
              "published_proxies"
          ]

          if len(links) != expected:
              raise RuntimeError(
                  f"Report says {expected} proxies, "
                  f"but subscription contains "
                  f"{len(links)} links"
              )

          print(
              f"Validated {len(links)} "
              "published proxy links"
          )

          print(
              f"Working now: "
              f"{report['working_now_passed_both_urls']}"
          )

          print(
              f"Retained from history: "
              f"{report['retained_from_previous_success']}"
          )
          PY

      - name: Commit generated files
        run: |
          git config user.name \
            "github-actions[bot]"

          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            docs/iran-all.json \
            docs/iran-all-plain.txt \
            docs/iran-v2ray.txt \
            docs/iran-v2ray-plain.txt \
            docs/iran-report.json \
            docs/iran-test-results.json \
            docs/proxy-history.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit \
            -m "Test and update Iranian proxy feeds"

          git push
