name: Update Iranian proxy feeds

on:
  workflow_dispatch:

  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write

concurrency:
  group: iran-proxy-feed-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Confirm curl SOCKS support
        run: |
          curl --version

      - name: Generate and test feeds
        run: |
          python convert.py

      - name: Validate JSON files
        run: |
          python -m json.tool docs/iran-all.json > /dev/null
          python -m json.tool docs/iran-report.json > /dev/null
          python -m json.tool docs/iran-test-results.json > /dev/null
          python -m json.tool docs/proxy-history.json > /dev/null

      - name: Validate subscriptions
        run: |
          python - <<'PY'
          import base64
          import json
          from pathlib import Path

          report = json.loads(
              Path(
                  "docs/iran-report.json"
              ).read_text(
                  encoding="utf-8"
              )
          )

          files = {
              "verified": (
                  Path(
                      "docs/iran-verified-proxies.txt"
                  ),
                  {
                      "http",
                      "socks4",
                      "socks5",
                  },
              ),
              "openray": (
                  Path(
                      "docs/iran-openray.txt"
                  ),
                  {
                      "vless",
                      "vmess",
                      "trojan",
                      "ss",
                      "ssr",
                      "hysteria2",
                      "hy2",
                      "tuic",
                  },
              ),
              "combined": (
                  Path(
                      "docs/iran-combined.txt"
                  ),
                  {
                      "http",
                      "socks4",
                      "socks5",
                      "vless",
                      "vmess",
                      "trojan",
                      "ss",
                      "ssr",
                      "hysteria2",
                      "hy2",
                      "tuic",
                  },
              ),
          }

          decoded_counts = {}

          for name, (path, allowed) in files.items():
              encoded = path.read_text(
                  encoding="ascii"
              ).strip()

              if encoded:
                  decoded = base64.b64decode(
                      encoded,
                      validate=True,
                  ).decode("utf-8")
              else:
                  decoded = ""

              links = [
                  line.strip()
                  for line in decoded.splitlines()
                  if line.strip()
              ]

              invalid = []

              for link in links:
                  if "://" not in link:
                      invalid.append(link)
                      continue

                  scheme = link.split(
                      "://",
                      1,
                  )[0].lower()

                  if scheme not in allowed:
                      invalid.append(link)

              if invalid:
                  raise RuntimeError(
                      f"{name} has invalid links: "
                      f"{invalid[:5]}"
                  )

              decoded_counts[name] = len(links)

          expected_verified = report[
              "published_verified_proxies"
          ]

          expected_openray = report[
              "openray_share_links"
          ]

          expected_combined = report[
              "combined_subscription_links"
          ]

          if (
              decoded_counts["verified"]
              != expected_verified
          ):
              raise RuntimeError(
                  "Verified subscription count mismatch"
              )

          if (
              decoded_counts["openray"]
              != expected_openray
          ):
              raise RuntimeError(
                  "OpenRay subscription count mismatch"
              )

          if (
              decoded_counts["combined"]
              != expected_combined
          ):
              raise RuntimeError(
                  "Combined subscription count mismatch"
              )

          print(
              json.dumps(
                  decoded_counts,
                  indent=2,
              )
          )
          PY

      - name: Commit generated files
        run: |
          git config user.name \
            "github-actions[bot]"

          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            docs/iran-all.json \
            docs/iran-verified-proxies.txt \
            docs/iran-verified-proxies-plain.txt \
            docs/iran-openray.txt \
            docs/iran-openray-plain.txt \
            docs/iran-combined.txt \
            docs/iran-combined-plain.txt \
            docs/iran-report.json \
            docs/iran-test-results.json \
            docs/proxy-history.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit \
            -m "Update Iranian proxy feeds"

          git push
